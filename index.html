<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>定期テスト対策アプリ</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'M PLUS Rounded 1c', 'Hiragino Sans', sans-serif; background: #fff0f5; min-height: 100vh; }
  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; min-height: 100vh; }

  /* ホーム */
  #home { background: linear-gradient(160deg, #fce4ec 0%, #f3e5f5 40%, #e8eaf6 100%); align-items: center; padding: 48px 20px 40px; position: relative; overflow: hidden; }
  #home::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(#f48fb1 1px, transparent 1px); background-size: 28px 28px; opacity: 0.18; pointer-events: none; }
  .home-mascot { font-size: 3.2rem; margin-bottom: 10px; }
  .home-title { font-size: 1.55rem; font-weight: 800; letter-spacing: 1px; background: linear-gradient(135deg, #e91e8c, #9c27b0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
  .home-sub { font-size: 0.82rem; color: #ad5f8a; margin-bottom: 36px; }
  .subject-cards { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 360px; position: relative; z-index: 1; }
  .subject-card { border-radius: 22px; padding: 20px 18px; cursor: pointer; transition: transform .18s, box-shadow .18s; display: flex; align-items: center; gap: 14px; box-shadow: 0 6px 20px rgba(0,0,0,.12); position: relative; overflow: hidden; }
  .subject-card::after { content: '✦'; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 1.1rem; opacity: 0.35; color: #fff; }
  .subject-card:hover { transform: translateY(-3px) scale(1.015); box-shadow: 0 12px 28px rgba(0,0,0,.18); }
  .subject-card .icon { font-size: 2.2rem; }
  .subject-card .info h2 { font-size: 1.2rem; font-weight: 800; color: #fff; }
  .subject-card .info p  { font-size: 0.75rem; color: rgba(255,255,255,.88); margin-top: 2px; }
  .card-chiri   { background: linear-gradient(135deg, #81d4fa, #29b6f6); }
  .card-rekishi { background: linear-gradient(135deg, #f48fb1, #ec407a); }
  .card-seibutsu{ background: linear-gradient(135deg, #a5d6a7, #43a047); }
  .home-note { margin-top: 28px; font-size: 0.73rem; color: #b388a0; position: relative; z-index: 1; }

  /* 共通 */
  .back-btn { align-self: flex-start; background: none; border: none; color: #c2739a; font-size: 0.88rem; cursor: pointer; padding: 4px 0; margin-bottom: 20px; font-weight: 700; font-family: inherit; }
  .back-btn:hover { color: #e91e8c; }

  /* モード選択 */
  #modeSelect { background: linear-gradient(160deg, #fff0f5 0%, #f8f0ff 100%); align-items: center; padding: 36px 20px; }
  .mode-subject-label { font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; color: #5d3a5a; }
  .mode-subject-label span { border-radius: 99px; padding: 3px 14px; color: #fff; font-size: 0.9rem; }
  .mode-desc { font-size: 0.8rem; color: #a06080; margin-bottom: 28px; text-align: center; max-width: 320px; }
  .mode-cards { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 360px; }
  .mode-card { background: #fff; border-radius: 20px; padding: 20px 18px; cursor: pointer; border: 2.5px solid #fce4ec; transition: border-color .18s, box-shadow .18s, transform .18s; display: flex; align-items: center; gap: 14px; box-shadow: 0 4px 14px rgba(236,64,122,.08); }
  .mode-card:hover { border-color: #f48fb1; box-shadow: 0 6px 20px rgba(236,64,122,.18); transform: translateY(-2px); }
  .mode-card .mode-icon { font-size: 1.9rem; }
  .mode-card .mode-info h3 { font-size: 1.05rem; font-weight: 800; color: #5d3a5a; }
  .mode-card .mode-info p  { font-size: 0.76rem; color: #a06080; margin-top: 3px; }
  .stats-bar { width: 100%; max-width: 360px; background: #fff; border-radius: 16px; padding: 14px 18px; margin-top: 18px; box-shadow: 0 4px 14px rgba(236,64,122,.08); border: 2px solid #fce4ec; }
  .stats-bar h4 { font-size: 0.78rem; color: #c2739a; margin-bottom: 8px; font-weight: 700; }
  .stats-row { display: flex; justify-content: space-between; font-size: 0.82rem; color: #7a4a6a; }
  .stats-val { font-weight: 800; color: #e91e8c; }

  /* クイズヘッダー */
  .quiz-header { padding: 14px 18px 12px; display: flex; align-items: center; gap: 12px; background: #fff; box-shadow: 0 2px 10px rgba(236,64,122,.1); }
  .quiz-header .back-btn { margin: 0; }
  .quiz-progress-wrap { flex: 1; }
  .quiz-progress-label { font-size: 0.72rem; color: #c2739a; margin-bottom: 4px; font-weight: 700; }
  .quiz-progress-bar { height: 8px; background: #fce4ec; border-radius: 99px; overflow: hidden; }
  .quiz-progress-fill { height: 100%; border-radius: 99px; transition: width .35s ease; }
  .quiz-count { font-size: 0.78rem; color: #c2739a; font-weight: 800; white-space: nowrap; }

  /* 4択クイズ */
  #quiz { background: linear-gradient(160deg, #fff0f5 0%, #f8f0ff 100%); }
  .quiz-body { flex: 1; padding: 18px 16px; display: flex; flex-direction: column; gap: 14px; max-width: 540px; margin: 0 auto; width: 100%; }
  .question-card { background: #fff; border-radius: 20px; padding: 22px 18px; box-shadow: 0 4px 16px rgba(236,64,122,.1); border: 2px solid #fce4ec; overflow: hidden; }

  /* 正誤バナー */
  .result-banner { display: none; border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; font-size: 1.1rem; font-weight: 800; text-align: center; letter-spacing: 0.5px; }
  .result-banner.correct { display: block; background: #e8f5e9; color: #2e7d32; border: 2px solid #81c784; }
  .result-banner.wrong   { display: block; background: #fce4ec; color: #c62828; border: 2px solid #f48fb1; }

  .question-num { font-size: 0.72rem; font-weight: 800; margin-bottom: 10px; }
  .question-text { font-size: 1.02rem; line-height: 1.75; font-weight: 500; color: #3d1a3a; }
  .choices { display: flex; flex-direction: column; gap: 8px; }

  /* 選択肢 */
  .choice-wrap { display: flex; flex-direction: column; gap: 0; }
  .choice-btn { background: #fff; border: 2.5px solid #fce4ec; border-radius: 16px; padding: 13px 15px; text-align: left; font-size: 0.93rem; cursor: pointer; transition: border-color .15s, background .15s, transform .1s; line-height: 1.55; color: #5d3a5a; font-family: inherit; font-weight: 500; width: 100%; }
  .choice-btn:hover:not(:disabled) { border-color: #f48fb1; background: #fff5f8; transform: translateX(3px); }
  .choice-btn.correct { border-color: #66bb6a; background: #e8f5e9; color: #2e7d32; border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-bottom: none; }
  .choice-btn.wrong   { border-color: #ef9a9a; background: #fff5f5; color: #c62828; border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-bottom: none; }
  .choice-btn.show-correct { border-color: #66bb6a; background: #e8f5e9; color: #2e7d32; border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-bottom: none; }
  .choice-btn.neutral-after { border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-bottom: none; }
  .choice-btn:disabled { cursor: default; }

  /* 選択肢ごとの解説 */
  .choice-note { display: none; font-size: 0.8rem; line-height: 1.55; padding: 8px 14px 10px; border: 2px solid #e2e8f0; border-top: none; border-bottom-left-radius: 14px; border-bottom-right-radius: 14px; color: #555; background: #fafafa; }
  .choice-note.correct-note { border-color: #66bb6a; background: #f1f8e9; color: #2e7d32; }
  .choice-note.wrong-note   { border-color: #ef9a9a; background: #fff9f9; color: #a00; }
  .choice-note.show { display: block; }

  /* 全体解説 */
  .explanation-box { background: linear-gradient(135deg, #fce4ec, #f3e5f5); border-left: 4px solid #f48fb1; border-radius: 0 16px 16px 0; padding: 14px 16px; font-size: 0.86rem; line-height: 1.65; color: #6a1a5a; display: none; }
  .explanation-box.show { display: block; }
  .explanation-box strong { display: block; margin-bottom: 4px; font-size: 0.78rem; color: #c2739a; }

  .next-btn { background: linear-gradient(135deg, #f48fb1, #ce93d8); color: #fff; border: none; border-radius: 99px; padding: 14px; font-size: 0.98rem; font-weight: 800; cursor: pointer; transition: opacity .15s, transform .15s; font-family: inherit; box-shadow: 0 4px 14px rgba(244,143,177,.4); display: none; }
  .next-btn:hover { opacity: .88; transform: translateY(-1px); }
  .next-btn.show { display: block; }

  /* フラッシュカード */
  #flash { background: linear-gradient(160deg, #fff0f5 0%, #f8f0ff 100%); }
  .flash-body { flex: 1; padding: 18px 16px; display: flex; flex-direction: column; gap: 14px; max-width: 540px; margin: 0 auto; width: 100%; }
  .flash-card { background: #fff; border-radius: 24px; padding: 32px 22px; box-shadow: 0 6px 20px rgba(236,64,122,.12); border: 2.5px solid #fce4ec; min-height: 230px; display: flex; flex-direction: column; justify-content: center; cursor: pointer; transition: transform .18s, box-shadow .18s; user-select: none; position: relative; overflow: hidden; }
  .flash-card::before { content: '✿'; position: absolute; top: 12px; right: 16px; font-size: 1.4rem; opacity: 0.12; color: #e91e8c; }
  .flash-card:hover { transform: scale(1.015); box-shadow: 0 10px 28px rgba(236,64,122,.18); }
  .flash-label { font-size: 0.7rem; font-weight: 800; letter-spacing: 1.5px; margin-bottom: 14px; }
  .flash-q { font-size: 1.08rem; font-weight: 500; line-height: 1.75; color: #3d1a3a; }
  .flash-a { font-size: 1.12rem; font-weight: 800; line-height: 1.6; color: #c2185b; display: none; }
  .flash-exp { font-size: 0.83rem; color: #a06080; line-height: 1.65; margin-top: 12px; display: none; }
  .flash-tap { font-size: 0.78rem; color: #d4a0b8; text-align: center; margin-top: 10px; }
  .flash-actions { display: none; flex-direction: row; gap: 12px; }
  .flash-actions.show { display: flex; }
  .flash-btn { flex: 1; padding: 14px; border: none; border-radius: 16px; font-size: 0.93rem; font-weight: 800; cursor: pointer; transition: opacity .15s, transform .15s; font-family: inherit; }
  .flash-btn.ok { background: linear-gradient(135deg, #c8e6c9, #a5d6a7); color: #2e7d32; }
  .flash-btn.ng { background: linear-gradient(135deg, #ffcdd2, #ef9a9a); color: #c62828; }
  .flash-btn:hover { opacity: .85; transform: translateY(-1px); }

  /* 結果 */
  #result { background: linear-gradient(160deg, #fce4ec 0%, #f3e5f5 50%, #e8eaf6 100%); align-items: center; padding: 40px 20px; position: relative; overflow: hidden; }
  #result::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(#f48fb1 1px, transparent 1px); background-size: 24px 24px; opacity: 0.12; pointer-events: none; }
  .result-card { background: #fff; border-radius: 24px; padding: 30px 22px; box-shadow: 0 8px 28px rgba(236,64,122,.15); width: 100%; max-width: 380px; text-align: center; border: 2px solid #fce4ec; position: relative; z-index: 1; }
  .result-emoji { font-size: 3.6rem; margin-bottom: 10px; }
  .result-score { font-size: 2.6rem; font-weight: 800; margin-bottom: 2px; background: linear-gradient(135deg, #e91e8c, #9c27b0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .result-label { font-size: 0.83rem; color: #a06080; margin-bottom: 22px; }
  .result-bars { display: flex; flex-direction: column; gap: 10px; margin-bottom: 22px; text-align: left; }
  .result-bar-row { display: flex; align-items: center; gap: 10px; font-size: 0.82rem; color: #7a4a6a; }
  .result-bar-row label { width: 56px; }
  .result-bar-bg { flex: 1; height: 10px; background: #fce4ec; border-radius: 99px; overflow: hidden; }
  .result-bar-fill { height: 100%; border-radius: 99px; }
  .result-bar-row .val { width: 34px; text-align: right; font-weight: 800; color: #5d3a5a; }
  .result-btns { display: flex; flex-direction: column; gap: 10px; }
  .result-btn { padding: 13px; border: none; border-radius: 99px; font-size: 0.93rem; font-weight: 800; cursor: pointer; font-family: inherit; transition: opacity .15s, transform .15s; }
  .result-btn.primary { background: linear-gradient(135deg, #f48fb1, #ce93d8); color: #fff; box-shadow: 0 4px 14px rgba(244,143,177,.4); }
  .result-btn.secondary { background: #fce4ec; color: #c2739a; }
  .result-btn:hover { opacity: .87; transform: translateY(-1px); }
  .review-list { width: 100%; max-width: 380px; margin-top: 18px; position: relative; z-index: 1; }
  .review-item { background: #fff; border-radius: 14px; padding: 13px 15px; margin-bottom: 10px; font-size: 0.83rem; border-left: 4px solid #f48fb1; box-shadow: 0 2px 8px rgba(236,64,122,.08); }
  .review-item .ri-q { font-weight: 500; margin-bottom: 4px; color: #5d3a5a; }
  .review-item .ri-a { color: #43a047; font-weight: 800; }
  .tag { display: inline-block; border-radius: 99px; padding: 2px 12px; font-size: 0.72rem; color: #fff; margin-right: 6px; font-weight: 700; }
  .tag-chiri    { background: linear-gradient(135deg, #4fc3f7, #29b6f6); }
  .tag-rekishi  { background: linear-gradient(135deg, #f48fb1, #ec407a); }
  .tag-seibutsu { background: linear-gradient(135deg, #81c784, #43a047); }
</style>
</head>
<body>

<!-- ホーム -->
<div id="home" class="screen active">
  <p class="home-mascot">🌸</p>
  <p class="home-title">定期テスト対策</p>
  <p class="home-sub">✨ 偏差値60レベル ｜ 地理 / 歴史 / 生物 ✨</p>
  <div class="subject-cards">
    <div class="subject-card card-chiri" onclick="openMode('chiri')">
      <div class="icon">🌍</div>
      <div class="info"><h2>地理</h2><p>地図投影法・時差・国際機関・領土問題 ほか</p></div>
    </div>
    <div class="subject-card card-rekishi" onclick="openMode('rekishi')">
      <div class="icon">📜</div>
      <div class="info"><h2>歴史</h2><p>江戸時代・市民革命・フランス革命・清 ほか</p></div>
    </div>
    <div class="subject-card card-seibutsu" onclick="openMode('seibutsu')">
      <div class="icon">🔬</div>
      <div class="info"><h2>生物</h2><p>顕微鏡・細胞小器官・ATP・光合成・細胞呼吸</p></div>
    </div>
  </div>
  <p class="home-note">🌷 プリント・教科書の内容から出題</p>
</div>

<!-- モード選択 -->
<div id="modeSelect" class="screen">
  <button class="back-btn" onclick="showScreen('home')">← 科目選択に戻る</button>
  <p class="mode-subject-label" id="modeSubjectLabel"></p>
  <p class="mode-desc" id="modeDesc"></p>
  <div class="mode-cards">
    <div class="mode-card" onclick="startQuiz()">
      <div class="mode-icon">📝</div>
      <div class="mode-info"><h3>4択クイズ</h3><p>4つの選択肢から正解を選ぶ。全選択肢に解説付き。</p></div>
    </div>
    <div class="mode-card" onclick="startFlash()">
      <div class="mode-icon">🃏</div>
      <div class="mode-info"><h3>一問一答フラッシュカード</h3><p>カードをタップして答えを確認。自己採点方式。</p></div>
    </div>
  </div>
  <div class="stats-bar">
    <h4>🌸 この科目の記録</h4>
    <div class="stats-row"><span>4択 最高スコア</span><span class="stats-val" id="statBest">—</span></div>
    <div class="stats-row" style="margin-top:4px"><span>一問一答 正答率</span><span class="stats-val" id="statFlash">—</span></div>
  </div>
</div>

<!-- 4択クイズ -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="confirmBack()">← 戻る</button>
    <div class="quiz-progress-wrap">
      <p class="quiz-progress-label" id="quizProgressLabel"></p>
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quizProgressFill"></div></div>
    </div>
    <span class="quiz-count" id="quizCount"></span>
  </div>
  <div class="quiz-body">
    <div class="question-card">
      <div class="result-banner" id="resultBanner"></div>
      <p class="question-num" id="questionNum"></p>
      <p class="question-text" id="questionText"></p>
    </div>
    <div class="choices" id="choices"></div>
    <div class="explanation-box" id="explanationBox"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">つぎの問題へ ✦</button>
  </div>
</div>

<!-- フラッシュカード -->
<div id="flash" class="screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="confirmBack()">← 戻る</button>
    <div class="quiz-progress-wrap">
      <p class="quiz-progress-label" id="flashProgressLabel"></p>
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="flashProgressFill"></div></div>
    </div>
    <span class="quiz-count" id="flashCount"></span>
  </div>
  <div class="flash-body">
    <div class="flash-card" id="flashCard" onclick="revealFlash()">
      <p class="flash-label" id="flashLabel">❓ 問題</p>
      <p class="flash-q" id="flashQ"></p>
      <p class="flash-a" id="flashA"></p>
      <p class="flash-exp" id="flashExp"></p>
    </div>
    <p class="flash-tap" id="flashTap">🌸 カードをタップして答えを表示</p>
    <div class="flash-actions" id="flashActions">
      <button class="flash-btn ok" onclick="flashAnswer(true)">✅ 正解！</button>
      <button class="flash-btn ng" onclick="flashAnswer(false)">❌ 不正解</button>
    </div>
  </div>
</div>

<!-- 結果 -->
<div id="result" class="screen">
  <div class="result-card">
    <p class="result-emoji" id="resultEmoji"></p>
    <p class="result-score" id="resultScore"></p>
    <p class="result-label" id="resultLabel"></p>
    <div class="result-bars" id="resultBars"></div>
    <div class="result-btns">
      <button class="result-btn primary" onclick="retry()">🌸 もう一度挑戦！</button>
      <button class="result-btn secondary" onclick="showScreen('modeSelect')">モード選択に戻る</button>
      <button class="result-btn secondary" onclick="showScreen('home')">科目選択に戻る</button>
    </div>
  </div>
  <div class="review-list" id="reviewList"></div>
</div>

<script>
const DB = {
  chiri: {
    label:'地理', color:'#29b6f6', tagClass:'tag-chiri',
    desc:'地図投影法・時差・領土問題・国際機関・貿易協定',
    quiz:[
      { q:"メルカトル図法の特徴として正しいものはどれか？",
        choices:["面積が正確（正積図法）","角度が正確で等角航路が直線になる","中心からの距離と方位が正確","すべての要素が正確に表される"],
        answer:1,
        choiceExps:["面積が正確なのはサンソン・モルワイデ図法などの正積図法。メルカトルは高緯度ほど面積が拡大する。","✅ 正解！メルカトル図法は正角図法で、等角航路（コンパスを使って進む航路）が直線になる。大航海時代の航海に使われた。","中心からの距離・方位が正確なのは正距方位図法。","4つの要素（距離・面積・角度・方位）すべてが正確な地図投影法は存在しない。"],
        exp:"メルカトル図法は正角図法。等角航路が直線になるため大航海時代に普及。ただし高緯度ほど面積が拡大する欠点がある。" },
      { q:"サンソン図法の特徴として正しいものはどれか？",
        choices:["角度が正確で航海に利用される","正積図法で緯線ごとの長さの比が等しい","中心からの方位が正確","面積と角度の両方が正確"],
        answer:1,
        choiceExps:["角度が正確で航海に利用されるのはメルカトル図法（正角図法）。","✅ 正解！サンソン図法は正積図法で、同じ緯線上ならどこでも長さの比が正確。「サンソンのサはサインカーブのサ」。","中心からの方位が正確なのは正距方位図法。","面積と角度の両方が正確な地図は存在しない（球面を平面に展開すると必ずどこかひずむ）。"],
        exp:"サンソン図法は正積図法。低緯度の中央経線付近では正確だが高緯度でひずみが大きい。" },
      { q:"日本の標準時子午線はどれか？",
        choices:["東経120度","東経130度","東経135度","東経140度"],
        answer:2,
        choiceExps:["東経120度は中国の標準時子午線のひとつ。日本より1時間遅い。","東経130度は九州付近を通るが、日本の標準時子午線ではない。","✅ 正解！東経135度（兵庫県明石市付近）が日本の標準時子午線。135÷15＝9時間の時差。","東経140度は東北・関東付近を通るが、日本の標準時子午線ではない。"],

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function openMode(subject){
  currentSubject=subject;
  const d=DB[subject];
  document.getElementById('modeSubjectLabel').innerHTML=`<span class="tag tag-${subject}">${d.label}</span> 学習モードを選択`;
  document.getElementById('modeDesc').textContent=d.desc;
  const s=stats[subject]||{};
  document.getElementById('statBest').textContent=s.quizBest!=null?`${s.quizBest}/${d.quiz.length} 問`:'—';
  document.getElementById('statFlash').textContent=s.flashRate!=null?`${s.flashRate}%`:'—';
  showScreen('modeSelect');
}

function startQuiz(){
  currentMode='quiz';
  const d=DB[currentSubject];
  shuffledQ=shuffle([...d.quiz]);
  currentIndex=0; score=0; wrongList=[];
  document.getElementById('quizProgressLabel').textContent=`${d.label} 4択クイズ`;
  document.getElementById('quizProgressFill').style.background=`linear-gradient(90deg,${d.color},#ce93d8)`;
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion(){
  const d=DB[currentSubject], total=shuffledQ.length, q=shuffledQ[currentIndex];
  document.getElementById('quizCount').textContent=`${currentIndex+1} / ${total}`;
  document.getElementById('quizProgressFill').style.width=`${(currentIndex/total)*100}%`;
  document.getElementById('questionNum').innerHTML=`<span class="tag tag-${currentSubject}">${d.label}</span> 問 ${currentIndex+1}`;
  document.getElementById('questionText').textContent=q.q;

  // バナーリセット
  const banner=document.getElementById('resultBanner');
  banner.className='result-banner'; banner.textContent='';

  // 選択肢をシャッフル（元のインデックスを保持）
  const sc=shuffleWithIndex(q.choices);
  const ci=sc.findIndex(c=>c.origIdx===q.answer);

  const choicesEl=document.getElementById('choices');
  choicesEl.innerHTML='';
  sc.forEach((c,i)=>{
    const wrap=document.createElement('div');
    wrap.className='choice-wrap';

    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.textContent=`${'①②③④'[i]} ${c.text}`;
    btn.dataset.correct=(i===ci)?'1':'0';
    btn.dataset.origIdx=c.origIdx;
    btn.onclick=()=>selectChoice(btn, ci, q, sc);

    const note=document.createElement('p');
    note.className='choice-note';
    note.dataset.noteFor=i;

    wrap.appendChild(btn);
    wrap.appendChild(note);
    choicesEl.appendChild(wrap);
  });

  const exp=document.getElementById('explanationBox');
  exp.innerHTML=''; exp.classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');
}

function selectChoice(btn, correctIdx, q, shuffledChoices){
  const buttons=document.querySelectorAll('.choice-btn');
  buttons.forEach(b=>b.disabled=true);

  const isCorrect=btn.dataset.correct==='1';

  // バナー表示
  const banner=document.getElementById('resultBanner');
  if(isCorrect){
    banner.textContent='✅ 正解！すばらしい！';
    banner.className='result-banner correct';
    score++;
  } else {
    banner.textContent='❌ 不正解…正解は緑の選択肢だよ';
    banner.className='result-banner wrong';
    wrongList.push(q);
  }

  // 各選択肢に色＋解説を表示
  buttons.forEach((b,i)=>{
    const origIdx=parseInt(b.dataset.origIdx);
    const noteEl=b.parentElement.querySelector('.choice-note');
    const noteText=q.choiceExps ? q.choiceExps[origIdx] : '';

    if(parseInt(b.dataset.correct)===1){
      b.classList.add('show-correct');
      noteEl.className='choice-note correct-note show';
    } else {
      b.classList.add('neutral-after');
      noteEl.className='choice-note wrong-note show';
    }
    noteEl.textContent=noteText;
  });

  // 自分の選択に wrong クラス（正解でない場合）
  if(!isCorrect) btn.classList.add('wrong');

  const exp=document.getElementById('explanationBox');
  exp.innerHTML=`<strong>📖 まとめ解説</strong>${q.exp}`;
  exp.classList.add('show');
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion(){
  currentIndex++;
  if(currentIndex>=shuffledQ.length) showQuizResult();
  else renderQuestion();
}

function showQuizResult(){
  const d=DB[currentSubject], total=shuffledQ.length, pct=Math.round(score/total*100);
  if(!stats[currentSubject]) stats[currentSubject]={};
  if(stats[currentSubject].quizBest==null||score>stats[currentSubject].quizBest){ stats[currentSubject].quizBest=score; saveStats(); }
  let emoji='😓',msg='もう一度復習しよう！';
  if(pct>=90){emoji='🎉';msg='完璧！すごい！';}
  else if(pct>=70){emoji='🌸';msg='よくできました！';}
  else if(pct>=50){emoji='🤔';msg='もう少し！';}
  document.getElementById('resultEmoji').textContent=emoji;
  document.getElementById('resultScore').textContent=`${score} / ${total}`;
  document.getElementById('resultLabel').textContent=`正答率 ${pct}%　${msg}`;
  document.getElementById('resultBars').innerHTML=`
    <div class="result-bar-row"><label>正解</label><div class="result-bar-bg"><div class="result-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${d.color},#ce93d8)"></div></div><span class="val">${score}</span></div>
    <div class="result-bar-row"><label>不正解</label><div class="result-bar-bg"><div class="result-bar-fill" style="width:${100-pct}%;background:#ef9a9a"></div></div><span class="val">${total-score}</span></div>`;
  const rv=document.getElementById('reviewList');
  rv.innerHTML=wrongList.length>0?`<p style="font-size:.83rem;color:#c2739a;margin-bottom:8px;">📌 間違えた問題</p>`:'<p style="font-size:.83rem;color:#43a047;text-align:center;margin-top:8px;">🎊 全問正解！完璧！</p>';
  wrongList.forEach(q=>{ const el=document.createElement('div'); el.className='review-item'; el.innerHTML=`<div class="ri-q">${q.q}</div><div class="ri-a">正解：${q.choices[q.answer]}</div>`; rv.appendChild(el); });
  showScreen('result');
}

function startFlash(){
  currentMode='flash';
  const d=DB[currentSubject];
  shuffledQ=shuffle([...d.flash]);
  currentIndex=0; flashCorrect=0; wrongList=[];
  document.getElementById('flashProgressLabel').textContent=`${d.label} 一問一答`;
  document.getElementById('flashProgressFill').style.background=`linear-gradient(90deg,${d.color},#ce93d8)`;
  showScreen('flash');
  renderFlash();
}

function renderFlash(){
  const d=DB[currentSubject], total=shuffledQ.length, q=shuffledQ[currentIndex];
  flashRevealed=false;
  document.getElementById('flashCount').textContent=`${currentIndex+1} / ${total}`;
  document.getElementById('flashProgressFill').style.width=`${(currentIndex/total)*100}%`;
  document.getElementById('flashLabel').textContent='❓ 問題';
  document.getElementById('flashLabel').style.color=d.color;
  document.getElementById('flashQ').textContent=q.q;
  document.getElementById('flashA').style.display='none';
  document.getElementById('flashExp').style.display='none';
  document.getElementById('flashA').textContent=q.a;
  document.getElementById('flashExp').textContent=`💡 ${q.exp}`;
  document.getElementById('flashTap').style.display='block';
  document.getElementById('flashActions').classList.remove('show');
  document.getElementById('flashCard').style.borderColor='#fce4ec';
}

function revealFlash(){
  if(flashRevealed) return;
  flashRevealed=true;
  const d=DB[currentSubject];
  document.getElementById('flashLabel').textContent='✅ 答え';
  document.getElementById('flashA').style.display='block';
  document.getElementById('flashExp').style.display='block';
  document.getElementById('flashTap').style.display='none';
  document.getElementById('flashActions').classList.add('show');
  document.getElementById('flashCard').style.borderColor=d.color;
}

function flashAnswer(correct){
  if(correct) flashCorrect++;
  else wrongList.push(shuffledQ[currentIndex]);
  currentIndex++;
  if(currentIndex>=shuffledQ.length) showFlashResult();
  else renderFlash();
}

function showFlashResult(){
  const d=DB[currentSubject], total=shuffledQ.length, pct=Math.round(flashCorrect/total*100);
  if(!stats[currentSubject]) stats[currentSubject]={};
  stats[currentSubject].flashRate=pct; saveStats();
  let emoji='😓',msg='もう一度復習しよう！';
  if(pct>=90){emoji='🎉';msg='完璧！すごい！';}
  else if(pct>=70){emoji='🌸';msg='よくできました！';}
  else if(pct>=50){emoji='🤔';msg='もう少し！';}
  document.getElementById('resultEmoji').textContent=emoji;
  document.getElementById('resultScore').textContent=`${flashCorrect} / ${total}`;
  document.getElementById('resultLabel').textContent=`正答率 ${pct}%　${msg}`;
  document.getElementById('resultBars').innerHTML=`
    <div class="result-bar-row"><label>正解</label><div class="result-bar-bg"><div class="result-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${d.color},#ce93d8)"></div></div><span class="val">${flashCorrect}</span></div>
    <div class="result-bar-row"><label>不正解</label><div class="result-bar-bg"><div class="result-bar-fill" style="width:${100-pct}%;background:#ef9a9a"></div></div><span class="val">${total-flashCorrect}</span></div>`;
  const rv=document.getElementById('reviewList');
  rv.innerHTML=wrongList.length>0?`<p style="font-size:.83rem;color:#c2739a;margin-bottom:8px;">📌 間違えた問題</p>`:'<p style="font-size:.83rem;color:#43a047;text-align:center;margin-top:8px;">🎊 全問正解！完璧！</p>';
  wrongList.forEach(q=>{ const el=document.createElement('div'); el.className='review-item'; el.innerHTML=`<div class="ri-q">${q.q}</div><div class="ri-a">正解：${q.a}</div>`; rv.appendChild(el); });
  showScreen('result');
}

function retry(){ if(currentMode==='quiz') startQuiz(); else startFlash(); }
function confirmBack(){ if(confirm('途中ですが戻りますか？')) showScreen('modeSelect'); }
function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
function shuffleWithIndex(arr){ return shuffle(arr.map((text,origIdx)=>({text,origIdx}))); }
